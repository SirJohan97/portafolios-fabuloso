<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background with subtle rounded corners -->
  <rect width="64" height="64" rx="10" fill="#0a0a0a"/>

  <!-- Outer diamond frame -->
  <polygon points="32,4 60,32 32,60 4,32"
           fill="rgba(17,212,131,0.06)"
           stroke="#11d483"
           stroke-width="1.5"
           stroke-linejoin="round"/>

  <!-- Inner diamond accent -->
  <polygon points="32,14 50,32 32,50 14,32"
           fill="none"
           stroke="rgba(17,212,131,0.3)"
           stroke-width="0.8"
           stroke-linejoin="round"/>

  <!-- Corner tick marks -->
  <line x1="32" y1="4"  x2="32" y2="11" stroke="rgba(17,212,131,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="53" x2="32" y2="60" stroke="rgba(17,212,131,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="32" x2="11" y2="32" stroke="rgba(17,212,131,0.7)" stroke-width="2" stroke-linecap="round"/>
  <line x1="53" y1="32" x2="60" y2="32" stroke="rgba(17,212,131,0.7)" stroke-width="2" stroke-linecap="round"/>

  <!-- V chevron — the VANTA mark -->
  <polyline points="18,22 32,44 46,22"
            fill="none"
            stroke="#11d483"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Glow layer (duplicated, blurred via opacity trick) -->
  <polyline points="18,22 32,44 46,22"
            fill="none"
            stroke="rgba(17,212,131,0.25)"
            stroke-width="10"
            stroke-linecap="round"
            stroke-linejoin="round"/>
</svg>
